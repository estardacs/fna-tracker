name: Daily Summarize

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC = 03:00 Chile (CLT)
  workflow_dispatch:      # permite ejecutar manualmente desde GitHub

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger summarize-daily edge function
        run: |
          curl -f -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/summarize-daily" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "X-Secret: ${{ secrets.SUMMARIZER_SECRET }}" \
            --max-time 30
